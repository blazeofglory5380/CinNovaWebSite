<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 720" role="img" aria-label="Kiddo gameplay and parent dashboard concepts">
  <defs>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="dash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="c"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.1"/></filter>
  </defs>
  <!-- Gameplay half -->
  <rect x="0" y="0" width="720" height="720" fill="url(#play)"/>
  <g filter="url(#c)">
    <rect x="48" y="48" width="624" height="624" rx="28" fill="#fff"/>
    <rect x="80" y="80" width="560" height="72" rx="16" fill="#fef3c7"/>
    <text x="110" y="128" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#92400e">Alphabet Quest</text>
    <circle cx="580" cy="116" r="22" fill="#fbbf24"/><text x="580" y="123" text-anchor="middle" font-size="16" fill="#fff">★</text>
    <path d="M120 280 C220 220 300 340 400 260 C500 180 560 300 600 240" stroke="#f59e0b" stroke-width="8" fill="none" stroke-dasharray="12 8" stroke-linecap="round"/>
    <circle cx="120" cy="280" r="36" fill="#34d399"/><text x="120" y="290" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">A</text>
    <circle cx="400" cy="260" r="36" fill="#fb7185"/><text x="400" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">B</text>
    <circle cx="600" cy="240" r="36" fill="#a78bfa" opacity="0.45"/><text x="600" y="250" text-anchor="middle" font-size="22" font-weight="700" fill="#fff">C</text>
    <rect x="80" y="480" width="260" height="140" rx="20" fill="#fff7ed"/>
    <text x="110" y="530" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#9a3412">Daily streak</text>
    <circle cx="130" cy="580" r="16" fill="#fbbf24"/><circle cx="170" cy="580" r="16" fill="#fbbf24"/><circle cx="210" cy="580" r="16" fill="#fbbf24"/><circle cx="250" cy="580" r="16" fill="#e5e7eb"/>
    <rect x="380" y="480" width="260" height="140" rx="20" fill="#ede9fe"/>
    <text x="410" y="530" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#5b21b6">Treasure found!</text>
    <text x="410" y="580" font-family="system-ui,sans-serif" font-size="28">🏆 +50 stars</text>
  </g>
  <!-- Parent dashboard half -->
  <rect x="720" y="0" width="720" height="720" fill="url(#dash)"/>
  <g filter="url(#c)">
    <rect x="768" y="48" width="624" height="624" rx="28" fill="#fff"/>
    <rect x="800" y="80" width="560" height="64" rx="14" fill="#ffedd5"/>
    <text x="830" y="122" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#9a3412">Emma&apos;s Learning Week</text>
    <rect x="800" y="170" width="170" height="120" rx="16" fill="#fef3c7"/>
    <text x="830" y="220" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#78350f">Lessons</text>
    <text x="830" y="260" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#92400e">14</text>
    <rect x="995" y="170" width="170" height="120" rx="16" fill="#fce7f3"/>
    <text x="1025" y="220" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#9d174d">Learned</text>
    <text x="1025" y="260" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#be185d">3h 20m</text>
    <rect x="1190" y="170" width="170" height="120" rx="16" fill="#dbeafe"/>
    <text x="1220" y="220" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="#1e40af">Accuracy</text>
    <text x="1220" y="260" font-family="system-ui,sans-serif" font-size="36" font-weight="800" fill="#1d4ed8">92%</text>
    <rect x="800" y="320" width="560" height="200" rx="18" fill="#fff7ed"/>
    <text x="830" y="360" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#c2410c">PARENT INSIGHT</text>
    <text x="830" y="400" font-family="system-ui,sans-serif" font-size="18" fill="#78350f">Reading is Emma&apos;s superpower this week.</text>
    <text x="830" y="430" font-family="system-ui,sans-serif" font-size="18" fill="#78350f">Try 10 minutes of counting play tomorrow.</text>
    <rect x="800" y="545" width="260" height="90" rx="14" fill="#dcfce7"/>
    <text x="830" y="585" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#166534">Screen time: 25 min today</text>
    <rect x="1100" y="545" width="260" height="90" rx="14" fill="#ede9fe"/>
    <text x="1130" y="585" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#5b21b6">Safe mode: ON</text>
  </g>
</svg>
