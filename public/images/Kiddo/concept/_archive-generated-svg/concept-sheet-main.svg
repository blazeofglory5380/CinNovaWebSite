<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" role="img" aria-label="Kiddo learning adventure concept">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="45%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#431407" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="720" fill="url(#sky)"/>
  <ellipse cx="780" cy="110" rx="72" ry="72" fill="#fef08a" opacity="0.95"/>
  <ellipse cx="120" cy="90" rx="90" ry="36" fill="#fff" opacity="0.55"/>
  <ellipse cx="280" cy="70" rx="70" ry="28" fill="#fff" opacity="0.45"/>
  <path d="M0 500 C180 400 320 540 520 470 C680 410 800 450 960 420 L960 720 L0 720 Z" fill="url(#hill)"/>
  <path d="M0 520 C200 460 380 560 560 500 C700 455 820 490 960 470 L960 720 L0 720 Z" fill="#059669" opacity="0.35"/>
  <path d="M120 560 C280 520 400 580 560 540 C700 505 820 530 960 510" stroke="url(#path)" stroke-width="28" fill="none" stroke-linecap="round"/>
  <!-- Reading castle -->
  <g filter="url(#soft)" transform="translate(620 280)">
    <rect x="0" y="80" width="120" height="100" rx="8" fill="#c4b5fd"/>
    <rect x="20" y="50" width="40" height="50" rx="4" fill="#a78bfa"/>
    <rect x="60" y="30" width="50" height="70" rx="4" fill="#8b5cf6"/>
    <polygon points="20,50 40,20 60,50" fill="#ddd6fe"/>
    <polygon points="60,30 85,0 110,30" fill="#ddd6fe"/>
    <rect x="48" y="120" width="24" height="40" rx="4" fill="#7c3aed"/>
  </g>
  <!-- Number mountain -->
  <g filter="url(#soft)" transform="translate(80 300)">
    <polygon points="60,160 140,40 220,160" fill="#fbbf24"/>
    <polygon points="90,160 140,80 190,160" fill="#fde68a"/>
    <text x="140" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="42" font-weight="700" fill="#92400e">3</text>
  </g>
  <!-- Luna explorer -->
  <g filter="url(#soft)" transform="translate(300 360)">
    <ellipse cx="70" cy="130" rx="55" ry="18" fill="#000" opacity="0.08"/>
    <circle cx="70" cy="75" r="52" fill="#fb7185"/>
    <circle cx="52" cy="68" r="7" fill="#431407"/><circle cx="88" cy="68" r="7" fill="#431407"/>
    <path d="M58 88 Q70 100 82 88" stroke="#431407" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M70 30 C55 5 95 5 80 30" fill="#9a3412"/>
    <rect x="95" y="95" width="36" height="44" rx="10" fill="#f472b6"/>
    <rect x="18" y="108" width="104" height="58" rx="18" fill="#fda4af"/>
    <circle cx="120" cy="60" r="14" fill="#fbbf24"/>
  </g>
  <!-- Oliver owl -->
  <g filter="url(#soft)" transform="translate(480 320)">
    <ellipse cx="60" cy="120" rx="48" ry="14" fill="#000" opacity="0.08"/>
    <ellipse cx="60" cy="70" rx="50" ry="55" fill="#8b5cf6"/>
    <ellipse cx="60" cy="78" rx="32" ry="36" fill="#ede9fe"/>
    <circle cx="45" cy="68" r="10" fill="#fff"/><circle cx="75" cy="68" r="10" fill="#fff"/>
    <circle cx="45" cy="68" r="5" fill="#431407"/><circle cx="75" cy="68" r="5" fill="#431407"/>
    <polygon points="60,78 52,88 68,88" fill="#f59e0b"/>
    <rect x="35" y="38" width="50" height="8" rx="4" fill="#6d28d9" transform="rotate(-8 60 42)"/>
  </g>
  <!-- Nova star captain -->
  <g filter="url(#soft)" transform="translate(700 370)">
    <ellipse cx="55" cy="115" rx="42" ry="12" fill="#000" opacity="0.08"/>
    <circle cx="55" cy="65" r="40" fill="#818cf8"/>
    <circle cx="40" cy="60" r="6" fill="#431407"/><circle cx="70" cy="60" r="6" fill="#431407"/>
    <path d="M48 78 Q55 86 62 78" stroke="#431407" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="55,18 62,38 82,38 66,50 72,70 55,58 38,70 44,50 28,38 48,38" fill="#fbbf24"/>
    <rect x="30" y="95" width="50" height="36" rx="12" fill="#6366f1"/>
  </g>
  <!-- Floating letters -->
  <text x="200" y="200" font-family="Georgia,serif" font-size="48" font-weight="700" fill="#059669" opacity="0.7">A</text>
  <text x="420" y="180" font-family="Georgia,serif" font-size="36" font-weight="700" fill="#7c3aed" opacity="0.65">★</text>
  <text x="560" y="220" font-family="Georgia,serif" font-size="40" font-weight="700" fill="#0d9488" opacity="0.6">🐠</text>
</svg>
